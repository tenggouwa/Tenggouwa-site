# 部署到 /etc/nginx/sites-available/tenggouwa.conf 并 ln -s 到 sites-enabled。
# 把 your-api-domain 换成实际域名，准备好 TLS 证书。

server {
    listen 80;
    server_name your-api-domain;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name your-api-domain;

    ssl_certificate     /etc/letsencrypt/live/your-api-domain/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/your-api-domain/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # CORS 已在 FastAPI 里处理；nginx 只透传
    location /api/ {
        proxy_pass http://127.0.0.1:10095;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id      $request_id;
        proxy_read_timeout 60s;
    }

    location = /health/check {
        proxy_pass http://127.0.0.1:10095;
    }

    location / {
        return 404;
    }
}
