[alembic]
# 用 %(here)s 让 script_location / sys.path 跟 cwd 解耦——容器里 alembic 从 app/ 跑
script_location = %(here)s/alembic
prepend_sys_path = %(here)s/app
# 文件名带时间前缀，方便排序
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s
# sqlalchemy.url 通过 env.py 从我们自己的 config 体系拉取，这里留空

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
