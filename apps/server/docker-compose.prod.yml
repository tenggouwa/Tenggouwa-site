# 生产 stack：postgres + fastapi app + cloudflared tunnel
# 全部走 docker，宿主机不需要装 Python / nginx / postgresql。
#
# 启动：
#   cd ~/apps/Tenggouwa-server
#   cp -n .env.prod.sample .env       # 第一次：填好所有 secret
#   docker compose -f docker-compose.prod.yml --env-file .env up -d --build
#
# 看日志：
#   docker compose -f docker-compose.prod.yml logs -f app
#
# 销库重来（注意 -v 会删数据卷）：
#   docker compose -f docker-compose.prod.yml down -v
#
# 注意：app 服务用 `env_file:` 直接把 .env 喂进容器，不走 compose 的 ${VAR}
# 插值——避免 bcrypt 哈希里的 $ 被 docker compose 当成变量引用导致值被吞。

services:
  postgres:
    # pgvector/pgvector:pg16 = 官方 postgres:16 + pgvector 扩展。与旧 16-alpine 数据卷
    # 同为 PG16、格式兼容，仅换镜像（KB 语义检索需要 vector 扩展）。
    image: pgvector/pgvector:pg16
    container_name: tenggouwa-postgres
    restart: unless-stopped
    # 只绑 127.0.0.1：公网摸不到，DataGrip 等只能经 SSH 隧道连
    ports:
      - "127.0.0.1:5432:5432"
    # 1G 机器：cap 内存防止单容器吃光机器
    mem_limit: 256m
    memswap_limit: 384m
    cpus: 0.5
    # 日志封顶，防止容器 json 日志无限增长撑爆磁盘
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      POSTGRES_USER: tenggouwa
      POSTGRES_PASSWORD: ${POSTGRES_DEFAULT_PASSWORD}
      POSTGRES_DB: tenggouwa
    command:
      - postgres
      - -c
      - shared_buffers=48MB
      - -c
      - work_mem=2MB
      - -c
      - maintenance_work_mem=16MB
      - -c
      - max_connections=30
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tenggouwa -d tenggouwa"]
      interval: 5s
      timeout: 5s
      retries: 12

  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: tenggouwa-server:latest
    container_name: tenggouwa-app
    restart: unless-stopped
    # FastAPI + uvicorn + APScheduler 正常 100-200MB，给 384MB cap 留足
    mem_limit: 384m
    memswap_limit: 512m
    cpus: 0.7
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    env_file:
      - .env
    environment:
      ENV: prod
    depends_on:
      postgres:
        condition: service_healthy
    # 端口不发布到宿主机：cloudflared 在同一个 docker 网络里通过 app:10095 转发
    # 健康检查：打 /health/check。镜像是 slim 无 curl，用自带 python。
    # start_period 给迁移 + gunicorn 启动留足时间，期间失败不计入 retries。
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request,sys;
          sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:10095/health/check', timeout=3).getcode()==200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 60s

  cloudflared:
    # 注意：不要用 :latest——国内 docker hub 镜像的 latest 是远古版本（2020.7.0）
    image: cloudflare/cloudflared:2025.5.0
    container_name: tenggouwa-cloudflared
    restart: unless-stopped
    # cloudflared 之前没有内存上限：38 天不重启后缓慢涨内存，把 1.6G 机器拖进 OOM
    # thrash（journald/snapd crash-loop + SSH banner 超时 + API 530）。封顶后即便泄漏
    # 也只是容器被 OOM-kill + 自动重启（隧道秒级重连），不再拖垮整机。正常仅 ~30MB。
    mem_limit: 192m
    memswap_limit: 256m
    cpus: 0.3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    command: tunnel --no-autoupdate run
    environment:
      TUNNEL_TOKEN: ${CLOUDFLARE_TUNNEL_TOKEN}
      # 强制走 HTTP/2 over TCP，禁掉默认的 QUIC/UDP。
      # 阿里云出境到 CF 边缘的 UDP 链路不稳，QUIC 每隔几小时会 idle out，
      # 导致 agent 那条长 WS 被中转层甩掉（见 cloudflared 日志里反复出现的
      # "timeout: no recent network activity" / "failed to accept QUIC stream"）。
      TUNNEL_TRANSPORT_PROTOCOL: http2
    depends_on:
      app:
        condition: service_healthy

volumes:
  pg_data:
