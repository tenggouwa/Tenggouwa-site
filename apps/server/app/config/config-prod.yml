fastapi:
  port: 10095
  # 必须 1：终端 broker 是 per-worker 内存状态，多 worker 会出现
  # agent 连 A、admin/console 连 B 找不到对方的情况。横向扩需要换 Redis pubsub。
  workers: 1
  cors_allow_origins:
    - "https://tenggouwa.github.io"

postgres:
  default:
    # 在 docker compose 网络里通过服务名 `postgres` 解析
    host: postgres
    port: 5432
    db: tenggouwa
    user: tenggouwa

auth:
  # jwt_secret 走环境变量 AUTH_JWT_SECRET
  token_ttl_seconds: 86400
  admins:
    - username: tenggouwa
      # password_hash 走环境变量 ADMIN_TENGGOUWA_PASSWORD_HASH（bcrypt 哈希）
