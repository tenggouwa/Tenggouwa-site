fastapi:
  port: 10095
  workers: 2
  cors_allow_origins:
    # 主站（GitHub Pages，所有 /Tenggouwa-site/** 都从这个 origin 发请求）
    - "https://tenggouwa.github.io"

auth:
  # 生产 jwt_secret 通过环境变量 AUTH_JWT_SECRET 注入更安全；这里写假占位
  # admins 必须改成 password_hash（bcrypt）
  admins:
    - username: tenggouwa
      password_hash: REPLACE_WITH_BCRYPT_HASH
