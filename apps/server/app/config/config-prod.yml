fastapi:
  port: 10095
  workers: 2
  cors_allow_origins:
    - "https://tenggouwa.github.io"

postgres:
  default:
    # 在 docker compose 网络里通过服务名 `postgres` 解析
    host: postgres
    port: 5432
    db: tenggouwa
    user: tenggouwa

auth:
  # jwt_secret 走环境变量 AUTH_JWT_SECRET
  token_ttl_seconds: 86400
  admins:
    - username: tenggouwa
      # password_hash 走环境变量 ADMIN_TENGGOUWA_PASSWORD_HASH（bcrypt 哈希）
