<!doctype html>
<html lang="zh-CN" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="tenggouwa的 agent 平台：跟 AI 对话（ask）、管理知识库、查看可调用的 skills。"
    />
    <link rel="canonical" href="https://tenggouwa.com/agent/" />
    <title>agent · tenggouwa</title>
    <script>
      // 配合 pages-dist/404.html：把刷新 deep link 时丢失的原始 URL 还原回 history。
      // location.pathname 就是 404 redirect 刚把我们落到的 agent 根（ghpages 下是
      // /Tenggouwa-site/agent/，root host 下是 /agent/），所以按它判前缀，两种部署都对。
      (function () {
        try {
          var r = sessionStorage.getItem('tg_spa_redirect');
          if (!r) return;
          sessionStorage.removeItem('tg_spa_redirect');
          if (r.indexOf(location.pathname) !== 0) return;
          if (r === location.pathname + location.search + location.hash) return;
          history.replaceState(null, '', r);
        } catch (e) {}
      })();
    </script>
  </head>
  <body class="bg-terminal-bg text-terminal-gray font-mono">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
