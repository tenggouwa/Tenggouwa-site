version: 2
updates:
  # Root pnpm workspace (web + admin + packages/*).
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Group only safe minor/patch dev-dep bumps; majors get their own PRs.
      dev-dependencies:
        dependency-type: "development"
        update-types: ["patch", "minor"]

  # FastAPI backend (pip via pyproject.toml + uv.lock).
  - package-ecosystem: "pip"
    directory: "/apps/server"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"

  # GitHub Actions used by deploy-pages.yml + ci.yml.
  # This auto-bumps Node 20 -> Node 24 deprecated actions and similar churn.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(actions)"
