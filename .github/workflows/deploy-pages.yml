name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'scripts/build-pages.sh'
      - '.github/workflows/deploy-pages.yml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 不指定 version，让 pnpm/action-setup 读 package.json 的 packageManager 字段
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      - name: Build pages
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          # 在 repo Settings → Secrets and variables → Actions → Variables
          # 加一个 VITE_API_BASE = https://api.<你的域名>
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
        run: bash scripts/build-pages.sh

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
