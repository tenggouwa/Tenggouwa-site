name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'apps/admin/**'
      - 'scripts/build-pages.sh'
      - '.github/workflows/deploy-pages.yml'
      - 'pnpm-workspace.yaml'
      - 'package.json'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 不指定 version，让 pnpm/action-setup 读 package.json 的 packageManager 字段
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      - name: Build pages (ghpages subpath, noindex)
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          # 在 repo Settings → Secrets and variables → Actions → Variables
          # 加一个 VITE_API_BASE = https://api.<你的域名>
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          SITE_ORIGIN: ${{ vars.SITE_ORIGIN || 'https://tenggouwa.com' }}
        run: bash scripts/build-pages.sh

      - name: Build pages (root, for tenggouwa.com)
        env:
          REPO_NAME: ${{ github.event.repository.name }}
          VITE_API_BASE: ${{ vars.VITE_API_BASE }}
          SITE_ORIGIN: ${{ vars.SITE_ORIGIN || 'https://tenggouwa.com' }}
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          PAGES_TARGET: root
        run: bash scripts/build-pages.sh

      - name: Upload root build for downstream (Cloudflare Pages / 自有部署)
        uses: actions/upload-artifact@v4
        with:
          name: cf-dist
          path: cf-dist
          retention-days: 14

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: pages-dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4

  notify-search-engines:
    needs: deploy
    runs-on: ubuntu-latest
    # 只在 main 分支推送时通知（避免手动 dispatch 时反复推）
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download root sitemap
        run: |
          mkdir -p cf-dist
          curl -fsSL "${SITE_ORIGIN}/sitemap.xml" -o cf-dist/sitemap.xml || \
            echo "sitemap fetch failed; will rely on rebuild"
        env:
          SITE_ORIGIN: ${{ vars.SITE_ORIGIN || 'https://tenggouwa.com' }}

      - name: Ping IndexNow / Baidu
        env:
          SITE_ORIGIN: ${{ vars.SITE_ORIGIN || 'https://tenggouwa.com' }}
          SITEMAP_PATH: cf-dist/sitemap.xml
          INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
          BAIDU_SITE: ${{ vars.BAIDU_SITE }}
          BAIDU_TOKEN: ${{ secrets.BAIDU_TOKEN }}
        run: node scripts/seo-notify.mjs
