name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile=false

      - name: Build web (tsc --noEmit && vite build)
        run: pnpm --filter @tenggouwa/web build

      - name: Build admin (tsc --noEmit && vite build)
        run: pnpm --filter @tenggouwa/admin build

  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v6

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest (skipped when no tests collected)
        shell: bash
        run: |
          if find tests -name 'test_*.py' 2>/dev/null | grep -q .; then
            uv run pytest
          else
            echo "::notice::No tests collected; skipping."
          fi
