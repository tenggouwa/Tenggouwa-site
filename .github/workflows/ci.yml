name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      # CI 用 --frozen-lockfile：lockfile 由 dependabot / 本地 commit 保证同步。
      - run: pnpm install --frozen-lockfile

      - name: Test web (vitest)
        run: pnpm --filter @tenggouwa/web test

      - name: Build web (tsc --noEmit && vite build)
        run: pnpm --filter @tenggouwa/web build

      - name: Build admin (tsc --noEmit && vite build)
        run: pnpm --filter @tenggouwa/admin build

      - name: Build casino (tsc --noEmit && vite build)
        run: pnpm --filter @tenggouwa/casino build

  backend:
    name: Backend (ruff + pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Pytest (skipped when no tests collected)
        shell: bash
        run: |
          if find tests -name 'test_*.py' 2>/dev/null | grep -q .; then
            uv run pytest
          else
            echo "::notice::No tests collected; skipping."
          fi
